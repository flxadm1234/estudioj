services:
  db:
    image: postgres:16
    container_name: estudioj-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-estudioj}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - estudioj_pgdata:/var/lib/postgresql/data
volumes:
  estudioj_pgdata:
